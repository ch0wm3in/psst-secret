name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://psst:psst@localhost:5432/psst_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-not-for-production
      DEBUG: "true"
      ENABLE_AUTH: "true"
      ENABLE_LOCAL_LOGIN: "true"
      POSTGRES_USER: psst
      POSTGRES_PASSWORD: psst
      POSTGRES_DB: psst_test

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create .env for docker compose
        run: |
          cat <<EOF > .env
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          POSTGRES_DB=$POSTGRES_DB
          EOF

      - name: Start services from docker-compose
        run: docker compose up -d postgres redis

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U "$POSTGRES_USER" && break
            sleep 1
          done

      - name: Wait for Redis
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T redis redis-cli ping | grep -q PONG && break
            sleep 1
          done

      - name: setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --locked

      - name: Run migrations
        run: uv run python manage.py migrate --noinput

      - name: Run tests
        run: uv run pytest

      - name: Stop services
        if: always()
        run: docker compose down
