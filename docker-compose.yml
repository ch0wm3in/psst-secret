services:

 psst_secret:
  restart: on-failure
  build: .
  env_file: .env
  ports:
    - "8000:8000"
  depends_on:
    - postgres
    - redis
 postgres:
  restart: on-failure
  image: postgres:18.3
  volumes:
    - pgdata:/var/lib/postgresql/
  env_file: .env
  ports:
    - "5432:5432"

 redis:
  restart: on-failure
  image: redis:8.6.2
  command: redis-server --save "" --appendonly no
  ports:
    - "6379:6379"

volumes:
  pgdata: