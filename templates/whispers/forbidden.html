{% extends "base/layout.html" %}
{% load i18n %}

{% block title %}psst-secret — {% trans "Access Denied" %}{% endblock %}

{% block content %}
<div class="text-center py-16 space-y-4">
    <div class="text-5xl">🚫</div>
    <h1 class="text-2xl font-bold text-white">{% trans "Access denied" %}</h1>
    <p class="text-gray-400 max-w-md mx-auto">{% trans "Your IP address is not allowed to access this whisper." %}</p>
    <a href="{% url 'whispers:create' %}" class="inline-block mt-4 px-6 py-2 rounded-lg bg-brand-600 hover:bg-brand-500 text-white font-semibold transition">

</div>
{% endblock %}
